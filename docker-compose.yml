services:
  postgres:
    image: postgres:16-alpine
    container_name: finance_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finance_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - finance_network

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: finance_server
    env_file:
      - docker/.env.docker
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finance_network
    restart: unless-stopped

  seed:
    build:
      context: .
      dockerfile: docker/Dockerfile.seed
    container_name: finance_seed
    env_file:
      - docker/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finance_network
    profiles:
      - seed

volumes:
  postgres_data:

networks:
  finance_network:
    driver: bridge